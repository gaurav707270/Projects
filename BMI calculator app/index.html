<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container01 w-100 h-100 d-flex j-c-c ">
        <div class="contantbox01 w-75 h-100 bg-white b-r-15 ">
            <h1 class="d-flex j-c-c">BMI Calculator </h1>
            
            <div class="contentbox02 d-flex j-c-c ">
                <form class="m-t-20">
                    <p class="m-10 f-s-20"><label> Height in CM</label><label><input class="m-10 padding-5 b-r-15" type="text " id="height"></label></p>
                    <p class="m-10 f-s-20"><label> weight in CM</label><label><input class="m-10 padding-5 b-r-15" type="text " id="weight"></label></p>
                    <button class=" m-10 b-r-15 padding-5 bg-yellow d-flex j-c-c w-100">calculate</button>

                    <div id="results">
                        

                    </div>

                    <div id="weight-guide">

                    </div>
                    <hr>
                    <h3 class="d-flex j-c-c m-10">BMI Weight Guide</h3>
                    <p class=" d-flex j-c-c m-10">Under weight = less than 18.6</p>
                    <p class=" d-flex j-c-c m-10">Under weight = less than 18.6</p>
                    <p class=" d-flex j-c-c m-10">OverWeight  = Greatere than 24.9</p>
                </form>
            </div>

        </div>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
